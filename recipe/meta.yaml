{% set name = "irispy-lmsal" %}
{% set version = "0.6.0" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: caaedf437382a91fc67678b8b47daa7dec8916ffdc3b81dd5ff173de032d3157

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    - mpl_animators >=1.2.3
    - dkist >=1.16.0
    - ndcube >=2.4.0
    - pandas >=1.3.3
    - scipy >=1.7.0
    - sunpy >=7.0.0
    - sunraster >=0.7.0

test:
  imports:
    - irispy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://iris.lmsal.com/
  summary: Provides tools to read in and analyze data from the IRIS solar-observing satellite.
  license: BSD-3-Clause
  license_file: licenses/LICENSE.rst

extra:
  recipe-maintainers:
    - nabobalis
